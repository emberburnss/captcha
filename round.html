<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAPTCHA — verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- teachable machine libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

  <main class="screen screen-round">

    <!-- top bar -->
    <div class="round-topbar">
      <span class="round-counter" id="round-counter">round 1 / 7</span>
      <span class="round-status" id="round-status">identity verification in progress.</span>
    </div>

    <!-- main content -->
    <div class="round-content">

      <!-- left column: scenario + buttons -->
      <div class="round-left">
        <p class="scenario-text" id="scenario-text"></p>

        <!-- lock in button — visible while analyzing -->
        <button class="btn" id="lockin-btn" disabled>lock in expression</button>

        <!-- submit button — hidden until expression is locked -->
        <button class="btn hidden" id="submit-btn">submit for review</button>
      </div>

      <!-- right column: webcam + reading -->
      <div class="round-right">
        <div class="confidence-reading">
          <span class="reading-label">confidence:</span>
          <span class="reading-output blink" id="confidence-display">--%</span>
        </div>
        <div class="webcam-frame">
          <video id="webcam" autoplay playsinline muted></video>
          <div class="captured-overlay hidden" id="captured-overlay">
            <span class="captured-text">CAPTURED.</span>
          </div>
          <div class="rec-indicator">
            <span class="rec-dot"></span>
            REC <span id="timer">00:00</span>
          </div>
        </div>
        <div class="emotion-reading">
          <span class="reading-label">reading:</span>
          <span class="reading-output" id="emotion-output">analyzing...</span>
        </div>
      </div>

    </div>

  </main>

  <script>
    // ── PASTE YOUR TEACHABLE MACHINE MODEL URL HERE ──
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/cSmMQUG5F/';

    // ── emotion misreading map ──
    // what the machine detects → what it wrongly displays
    const mislabels = {
      'embarrassed': 'angry',
      'surprised':   'disgusted',
      'nervous':     'happy',
      'frustrated':  'calm',
      'confused':    'confident',
      'happy':       'sad',
      'blank':       'panicked'
    };

    // ── confidence arc per round (arrogant early, collapsing late) ──
    const confidenceByRound = [94, 91, 88, 85, 61, 34, 12];

    // ── round data ──
    const rounds = [
      {
        status: 'identity verification in progress.',
        scenario: 'you loudly drop your water bottle in the middle of a lecture. everyone turns to look at you.'
      },
      {
        status: 'processing. anomalies detected.',
        scenario: 'you wave back at someone who was not waving at you. they were waving at the person behind you.'
      },
      {
        status: 'recalibrating. your responses are irregular.',
        scenario: 'you slightly stumble while walking and turn around to find a person watching. how do you respond.'
      },
      {
        status: '<span class="bold-red">warning.</span> behavioral patterns unrecognized.',
        scenario: 'you are walking toward someone in a narrow hallway and you both keep moving to the same side.'
      },
      {
        status: '<span class="bold-red">error.</span> reviewing detection parameters.',
        scenario: 'you laugh at something and realize nobody else did. the room goes quiet.'
      },
      {
        status: 'system confidence: <strong>CRITICAL.</strong>',
        scenario: 'you forget the name of someone you have met more than once. they clearly remember yours.'
      },
      {
        status: 'system status: <strong>UNKNOWN.</strong>',
        scenario: 'you are not sure if you said something out loud or only thought it. you cannot tell anymore.'
      }
    ];

    // ── read round from URL ──
    const params = new URLSearchParams(window.location.search);
    const round = Math.min(Math.max(parseInt(params.get('round')) || 1, 1), 7);
    const data = rounds[round - 1];

    // ── populate page ──
    document.getElementById('round-counter').textContent = 'round ' + round + ' / 7';
    document.getElementById('round-status').innerHTML = data.status;
    document.getElementById('scenario-text').textContent = data.scenario;

    // ── state ──
    let model, webcamEl, webcamStream, isAnalyzing = true, currentDetection = '';

    const outputEl       = document.getElementById('emotion-output');
    const lockinBtn      = document.getElementById('lockin-btn');
    const submitBtn      = document.getElementById('submit-btn');
    const timerEl        = document.getElementById('timer');
    const overlayEl      = document.getElementById('captured-overlay');
    const confidenceEl   = document.getElementById('confidence-display');

    // ── timer ──
    let timerSeconds = 0;
    let timerInterval = null;

    function startTimer() {
      timerInterval = setInterval(function () {
        timerSeconds++;
        const mins = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        const secs = String(timerSeconds % 60).padStart(2, '0');
        timerEl.textContent = mins + ':' + secs;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    // ── load model and start webcam ──
    async function init() {
      const modelURL    = MODEL_URL + 'model.json';
      const metadataURL = MODEL_URL + 'metadata.json';

      model    = await tmImage.load(modelURL, metadataURL);
      webcamEl = document.getElementById('webcam');

      try {
        webcamStream = await navigator.mediaDevices.getUserMedia({ video: true });
        webcamEl.srcObject = webcamStream;
        webcamEl.addEventListener('loadeddata', () => {
          confidenceEl.textContent = confidenceByRound[round - 1] + '%';
          startTimer();
          predict();
        });
      } catch (err) {
        console.error('webcam access denied:', err);
        outputEl.textContent = 'camera unavailable.';
      }
    }

    // ── run prediction loop ──
    async function predict() {
      if (!isAnalyzing) return;

      const predictions = await model.predict(webcamEl);

      // check again after the async call in case lock in was clicked while waiting
      if (!isAnalyzing) return;

      // find the class with highest probability
      let top = predictions.reduce((a, b) => a.probability > b.probability ? a : b);
      currentDetection = top.className;

      // enable lock in only after first real prediction
      if (lockinBtn.disabled) lockinBtn.disabled = false;

      // show live reading while analyzing
      outputEl.textContent = currentDetection + '...';

      // use setTimeout instead of requestAnimationFrame so we can fully stop the loop
      setTimeout(predict, 100);
    }

    // ── show captured overlay ──
    function showCaptured() {
      overlayEl.classList.remove('hidden');
    }

    // ── lock in expression ──
    lockinBtn.addEventListener('click', function () {
      isAnalyzing = false;
      stopTimer();
      showCaptured();

      // normalise to lowercase to match mislabels keys
      const detected = currentDetection.toLowerCase().trim();
      const wrongLabel = mislabels[detected] || detected || 'unknown';
      const confidence = confidenceByRound[round - 1];

      // debug — open browser console (Cmd+Option+J) to see what was detected
      console.log('detected:', currentDetection, '→ normalised:', detected, '→ label:', wrongLabel);

      outputEl.textContent = 'you have responded: ' + wrongLabel + ' — ' + confidence + '% confidence';

      // swap buttons
      lockinBtn.classList.add('hidden');
      submitBtn.classList.remove('hidden');
    });

    // ── submit for review ──
    submitBtn.addEventListener('click', function () {
      window.location.href = 'fail.html?round=' + round;
    });

    // ── start ──
    init();
  </script>

</body>
</html>
